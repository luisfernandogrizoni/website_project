<div id="modalDashboard" class="modal-overlay">
    <div class="modal-content prontuario-modal">

        <div class="area-header">
            <div>
                <h2 id="d-nome">Carregando...</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="d-badge-status" class="badge">...</span>
                    <small style="color: rgba(255,255,255,0.8);" id="d-convenio">...</small>
                </div>
                <div class="header-actions">
                <button id="btnEdit" class="btn btn-action" data-id=""><i class="fas fa-edit"></i>Editar</button>
                <button id="btnInactivate" class="btn btn-action" data-id=""><i class="fas fa-archive"></i>Dar Baixa</button>

                </div>

                <button id="btnFecharDashboard" class="close-modal">&times;</button>
            </div>
        </div>

        <div class="area-stats">
            <div class="stat-card">
                <span class="stat-label">Idade</span>
                <strong id="d-idade">--</strong>
            </div>
            <div class="stat-card">
                <span class="stat-label">Internação</span>
                <strong id="d-internacao">--</strong>
            </div>

            <div class="stat-card" id="box-stats-ativo">
                <span class="stat-label">Previsão Alta</span>
                <strong id="d-previsao">--</strong>
            </div>

            <div class="stat-card" id="box-stats-inativo" style="display: none;">
                <span class="stat-label">Saída</span>
                <strong id="d-saida" style="color: var(--c-action);">--</strong>
            </div>
        </div>

        <div class="prontuario-dashboard-grid">

            <div class="area-main">
                <h3>Dados Pessoais</h3>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="info-group"><label>CPF</label> <span id="d-cpf"></span></div>
                    <div class="info-group"><label>RG</label> <span id="d-rg"></span></div>
                    <div class="info-group"><label>Nascimento</label> <span id="d-nascimento"></span></div>
                    <div class="info-group"><label>Cartão SUS</label> <span id="d-sus"></span></div>
                    <div class="info-group"><label>Nome da Mãe</label> <span id="d-mae"></span></div>
                    <div class="info-group"><label>Cônjuge</label> <span id="d-conjuge"></span></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
                     <div class="info-group"><label>Escolaridade</label> <span id="d-escolaridade"></span></div>
                     <div class="info-group"><label>Profissão</label> <span id="d-profissao"></span></div>
                     <div class="info-group"><label>Religião</label> <span id="d-religiao"></span></div>
                     <div class="info-group"><label>Estado Civil</label> <span id="d-civil"></span></div>
                </div>

            </div>

            <div class="area-side">

                <div class="side-card">
                    <h3>Localização & Contato</h3>
                    <div class="info-group">
                        <label>Endereço</label>
                        <span id="d-endereco"></span>
                    </div>
                    <div class="info-group">
                        <label>Cidade/Estado</label>
                        <span><span id="d-cidade"></span> - <span id="d-estado"></span></span>
                    </div>

                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #eee;">
                        <div class="info-group"><label>Contato Principal</label> <span id="d-contato"></span></div>
                        <div class="info-group"><label>Contato Secundário</label> <span id="d-contato2"></span></div>
                    </div>
                </div>

                <div class="side-card">
                    <h3>Responsável</h3>
                    <div class="info-group"><label>Nome</label> <span id="d-resp-nome"></span></div>
                    <div class="info-group"><label>Relação</label> <span id="d-resp-relacao"></span></div>
                    <div class="info-group"><label>Contribuição</label> <span id="d-contrib"></span></div>
                    <div class="info-group"><label>Documentos</label>
                        <span style="font-size: 0.8rem">CPF: <span id="d-resp-cpf"></span></span><br>
                        <span style="font-size: 0.8rem">RG: <span id="d-resp-rg"></span></span>
                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
